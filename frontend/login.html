<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="./assets/css/stylesheet.css" />
</head>
<body>
  <main style="max-width: 980px; margin: 0 auto; padding: 30px 18px;">
    <section class="card" style="max-width: 520px; margin: 0 auto;">
      <h1 class="hero__title" style="margin-bottom: 8px;">Login</h1>
      <p class="hero__subtitle" style="margin-top: 0;">UI placeholder (no backend wiring yet).</p>

      <form
        onsubmit="event.preventDefault(); window.location.href='./pages/dashboard.html';"
        style="margin-top: 18px; display:flex; flex-direction:column; gap:12px;"
      >
        <div class="field">
          <label>Email</label>
          <input class="input" type="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input class="input" type="password" placeholder="••••••••" required />
        </div>
        <div style="display:flex; gap:10px; margin-top: 6px;">
          <button class="btn btn--primary" type="submit">Login</button>
          <button class="btn" type="button" onclick="window.location.href='./index.html'">Back</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
